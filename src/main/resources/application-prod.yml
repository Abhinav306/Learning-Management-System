# ═══════════════════════════════════════════════════════════════
# AI-Powered LMS — Production Profile
# ═══════════════════════════════════════════════════════════════

server:
  port: 8080

spring:
  # ── DataSource ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:lms_db}
    username: ${DB_USER:lms_user}
    password: ${DB_PASSWORD:lms_password_123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

  # ── PGVector Store ──
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true

  # ── Flyway Database Migrations ──
  flyway:
    enabled: true
    baseline-on-migrate: true
