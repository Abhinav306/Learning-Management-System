version: '3.8'

services:
  # ── PostgreSQL Database with pgvector extension ──
  db:
    image: pgvector/pgvector:16-pgdg
    container_name: lms-postgres-db
    restart: always
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d lms_db -U lms_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache Service ──
  redis:
    image: redis:7.2-alpine
    container_name: lms-redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password_123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_AI_OPENAI_API_KEY=${SPRING_AI_OPENAI_API_KEY}
    volumes:
      - lms_uploads:/app/uploads
    networks:
      - lms-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  lms_uploads:

networks:
  lms-network:
    driver: bridge
